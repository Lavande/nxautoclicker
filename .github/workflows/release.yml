name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
      release_notes:
        description: "Release notes (optional)"
        required: false
        default: ""
      ref:
        description: "Branch, tag, or commit SHA of nxautoclicker-core to build (default: main)"
        required: false
        default: "main"

permissions:
  contents: write

env:
  PRIVATE_REPO: Lavande/nxautoclicker-core

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "NX Auto Clicker ${{ github.event.inputs.version }}" \
            --notes "${{ github.event.inputs.release_notes || format('Release {0}', github.event.inputs.version) }}" \
            --draft

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in src-tauri/target/release/bundle/deb/*.deb \
                   src-tauri/target/release/bundle/appimage/*.AppImage; do
            [ -f "$f" ] && gh release upload "${{ github.event.inputs.version }}" "$f" \
              --repo "${{ github.repository }}"
          done

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          rm -f "$CERT_PATH"

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate DMG background
        run: |
          python3 -m pip install --break-system-packages --quiet Pillow
          python3 <<'PYEOF'
          from PIL import Image, ImageDraw, ImageFont

          W, H = 660, 400
          img = Image.new('RGB', (W, H), (246, 246, 248))
          draw = ImageDraw.Draw(img)

          # Arrow between app icon (center ~220) and Applications (center ~520)
          cy = 210
          arrow_color = (195, 195, 195)
          draw.rectangle([270, cy - 2, 440, cy + 2], fill=arrow_color)
          draw.polygon([(455, cy), (435, cy - 10), (435, cy + 10)], fill=arrow_color)

          try:
              font = ImageFont.truetype('/System/Library/Fonts/Helvetica.ttc', 14)
          except Exception:
              font = ImageFont.load_default()
          text = 'Drag to Applications'
          bbox = draw.textbbox((0, 0), text, font=font)
          tw = bbox[2] - bbox[0]
          draw.text(((W - tw) // 2, cy + 30), text, fill=(160, 160, 160), font=font)

          img.save('/tmp/dmg-background.png')
          print('DMG background generated')
          PYEOF

      - name: Build Tauri app (aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target aarch64-apple-darwin

      - name: Notarize aarch64 app
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/NX Auto Clicker.app"
          ZIP_PATH="/tmp/NXAutoClicker_aarch64.zip"
          KEY_PATH=~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          KEY_ID="${{ secrets.APPLE_API_KEY }}"
          ISSUER="${{ secrets.APPLE_API_ISSUER }}"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "Zip size: $(du -h "$ZIP_PATH" | cut -f1)"

          echo "::group::Submit for notarization"
          SUBMIT_OUT=$(xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" 2>&1)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          echo "::endgroup::"

          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::Failed to get submission ID"
            exit 1
          fi
          echo "Submission ID: $SUBMISSION_ID"

          echo "::group::Wait for notarization (up to 30 min)"
          TIMEOUT=1800
          INTERVAL=30
          ELAPSED=0
          STATUS="In Progress"

          while [ "$ELAPSED" -lt "$TIMEOUT" ] && [ "$STATUS" = "In Progress" ]; do
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
            INFO_OUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" 2>&1) || true
            STATUS=$(echo "$INFO_OUT" | grep -i "status:" | head -1 | sed 's/.*status:[[:space:]]*//' | xargs)
            echo "[${ELAPSED}s / ${TIMEOUT}s] Status: $STATUS"
          done
          echo "::endgroup::"

          if [ "$STATUS" = "Accepted" ]; then
            echo "Notarization successful!"
            xcrun stapler staple "$APP_PATH"
          else
            echo "::error::Notarization status: $STATUS (after ${ELAPSED}s)"
            echo "::group::Notarization log"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" \
              /tmp/notarize_log.json 2>&1 || true
            cat /tmp/notarize_log.json 2>/dev/null || echo "No log available"
            echo "::endgroup::"
            echo "::group::Full submission info"
            xcrun notarytool info "$SUBMISSION_ID" \
              --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" 2>&1 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Rebuild aarch64 DMG after stapling
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/NX Auto Clicker.app"
          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          DMG_PATH=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_PATH" ]; then
            DMG_NAME=$(basename "$DMG_PATH")
            rm -f "$DMG_PATH"

            STAGE_DIR=$(mktemp -d)
            ditto "$APP_PATH" "$STAGE_DIR/NX Auto Clicker.app"

            create-dmg \
              --volname "NX Auto Clicker" \
              --background "/tmp/dmg-background.png" \
              --window-size 660 400 \
              --window-pos 200 120 \
              --icon-size 80 \
              --icon "NX Auto Clicker.app" 180 170 \
              --app-drop-link 480 170 \
              --hide-extension "NX Auto Clicker.app" \
              --codesign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
              --no-internet-enable \
              "$DMG_DIR/$DMG_NAME" \
              "$STAGE_DIR" && DMG_EXIT=0 || DMG_EXIT=$?

            if [ "$DMG_EXIT" -ne 0 ] && [ "$DMG_EXIT" -ne 2 ]; then
              echo "::error::create-dmg failed with exit code $DMG_EXIT"
              exit "$DMG_EXIT"
            fi
            rm -rf "$STAGE_DIR"
          fi

      - name: Build Tauri app (x86_64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target x86_64-apple-darwin

      - name: Notarize x86_64 app
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/NX Auto Clicker.app"
          ZIP_PATH="/tmp/NXAutoClicker_x86_64.zip"
          KEY_PATH=~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          KEY_ID="${{ secrets.APPLE_API_KEY }}"
          ISSUER="${{ secrets.APPLE_API_ISSUER }}"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "Zip size: $(du -h "$ZIP_PATH" | cut -f1)"

          echo "::group::Submit for notarization"
          SUBMIT_OUT=$(xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" 2>&1)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          echo "::endgroup::"

          if [ -z "$SUBMISSION_ID" ]; then
            echo "::error::Failed to get submission ID"
            exit 1
          fi
          echo "Submission ID: $SUBMISSION_ID"

          echo "::group::Wait for notarization (up to 30 min)"
          TIMEOUT=1800
          INTERVAL=30
          ELAPSED=0
          STATUS="In Progress"

          while [ "$ELAPSED" -lt "$TIMEOUT" ] && [ "$STATUS" = "In Progress" ]; do
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
            INFO_OUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" 2>&1) || true
            STATUS=$(echo "$INFO_OUT" | grep -i "status:" | head -1 | sed 's/.*status:[[:space:]]*//' | xargs)
            echo "[${ELAPSED}s / ${TIMEOUT}s] Status: $STATUS"
          done
          echo "::endgroup::"

          if [ "$STATUS" = "Accepted" ]; then
            echo "Notarization successful!"
            xcrun stapler staple "$APP_PATH"
          else
            echo "::error::Notarization status: $STATUS (after ${ELAPSED}s)"
            echo "::group::Notarization log"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" \
              /tmp/notarize_log.json 2>&1 || true
            cat /tmp/notarize_log.json 2>/dev/null || echo "No log available"
            echo "::endgroup::"
            echo "::group::Full submission info"
            xcrun notarytool info "$SUBMISSION_ID" \
              --key "$KEY_PATH" --key-id "$KEY_ID" --issuer "$ISSUER" 2>&1 || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Rebuild x86_64 DMG after stapling
        run: |
          APP_PATH="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/NX Auto Clicker.app"
          DMG_DIR="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg"
          DMG_PATH=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_PATH" ]; then
            DMG_NAME=$(basename "$DMG_PATH")
            rm -f "$DMG_PATH"

            STAGE_DIR=$(mktemp -d)
            ditto "$APP_PATH" "$STAGE_DIR/NX Auto Clicker.app"

            create-dmg \
              --volname "NX Auto Clicker" \
              --background "/tmp/dmg-background.png" \
              --window-size 660 400 \
              --window-pos 200 120 \
              --icon-size 80 \
              --icon "NX Auto Clicker.app" 180 170 \
              --app-drop-link 480 170 \
              --hide-extension "NX Auto Clicker.app" \
              --codesign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
              --no-internet-enable \
              "$DMG_DIR/$DMG_NAME" \
              "$STAGE_DIR" && DMG_EXIT=0 || DMG_EXIT=$?

            if [ "$DMG_EXIT" -ne 0 ] && [ "$DMG_EXIT" -ne 2 ]; then
              echo "::error::create-dmg failed with exit code $DMG_EXIT"
              exit "$DMG_EXIT"
            fi
            rm -rf "$STAGE_DIR"
          fi

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "${{ github.event.inputs.version }}" "$f" \
              --repo "${{ github.repository }}" --clobber
          done
          for f in src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "${{ github.event.inputs.version }}" "$f" \
              --repo "${{ github.repository }}" --clobber
          done

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $artifacts = @()
          $artifacts += Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" -ErrorAction SilentlyContinue
          $artifacts += Get-ChildItem -Path "src-tauri\target\release\bundle\msi\*.msi" -ErrorAction SilentlyContinue
          foreach ($f in $artifacts) {
            gh release upload "${{ github.event.inputs.version }}" $f.FullName --repo "${{ github.repository }}"
          }

  publish-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}" \
            --draft=false
